data_dir: data/one-image
image_path: data/one-image/image.webp
image_glob: "*.webp"
image_mode: RGB
image_size: 256
label_id: 0
num_classes: 1
repeats_per_epoch: 1024

hidden_dim: 128
num_heads: 4
num_blocks: 6
num_repeats: 8
bottleneck_dim: 16
patch_size: 16
window_threshold: 256.0

batch_size: 16
epochs: 100
max_steps: 5000
lr: 0.01
betas:
  - 0.9
  - 0.95
weight_decay: 0.0001
grad_clip_norm: 1.0
min_timestep: 0.0
max_timestep: 1.0
cfg_dropout_prob: 0.0 # overfit mode
loss_type: v-loss # options: x-loss, v-loss

log_every: 20
sample_every: 500
checkpoint_every: 500
sample_at_start: true
sample_num_images: 1
sample_num_steps: 64
sample_cfg_scale: 1.0
output_dir: output/fm-09
checkpoint_path: output/fm-09/checkpoints/last.ckpt

seed: 123
device: auto
num_workers: 0
gradient_checkpointing: true
precision: fp32

wandb_project: screening-flow-matching
wandb_run_name: null
wandb_mode: online # options: online, offline, disabled
